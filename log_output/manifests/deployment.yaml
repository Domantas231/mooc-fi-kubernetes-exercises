apiVersion: apps/v1
kind: Deployment
metadata:
  name: hashgenerator-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hashgenerator
  template:
    metadata:
      labels:
        app: hashgenerator
    spec:
      containers:
        - name: hashgenerator
          image: domantas231/log-output:2.1
          env:
            - name: PORT
              value: "3000"
            - name: PINGS_URL
              value: "http://pingpong-svc:2345/pings"